<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <link
    rel="stylesheet"
    href="./src/css/main.css"
  >
  <title>RWD | Page Template</title>
</head>

<body>
  <header class="heading row">
    <nav class="heading__nav-container container">
      <a
        class="heading__logo cell"
        href="/"
      >AppLab</a>
      <label
        for="burger-menu"
        class="cell heading__burger-container"
      >
        <img
          src="./src/images/icons/icons-menu.svg"
          alt="Open Menu"
          class="heading__burger-icon"
        >
      </label>
      <input
        type="checkbox"
        id="burger-menu"
        class="heading__burger-checkbox"
      >
      <ul class="heading__menu-list cell">
        <li class="heading__menu-list-item"><a href="#home">Home</a></li>
        <li class="heading__menu-list-item"><a href="#features">Features</a></li>
        <li class="heading__menu-list-item"><a href="#pricing">Pricing</a></li>
        <li class="heading__menu-list-item"><a href="#blog">Blog</a></li>
        <li class="heading__menu-list-item"><a href="#pages">Pages</a></li>
        <li class="heading__menu-list-item"><a href="#contact">Contact</a></li>
      </ul>
      <button
        type="button"
        class="heading__btn"
      >Download</button>
    </nav>
    <section class="heading__hero-container container">
      <div class="heading__hero-message cell">
        <h1 class="heading__hero-title">promote your app with applab</h1>
        <p class="heading__hero-text">Get more users to promote your app with this template</p>
        <button
          type="button"
          class="heading__hero-btn"
        >get start now</button>
      </div>
      <div
        aria-hidden="true"
        class="heading__hero-img-container cell"
      >
        <img
          src="./src/images/phone.png"
          alt="Mobile app screen"
          class="heading__hero-img"
        >
      </div>
    </section>
  </header>
</body>

</html>
